name: PR checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck + build (web)
        run: npm run build -w web

      - name: Tests (web + motivator-core)
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: E2E (web, warn)
        run: npm run test:e2e -w web

  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Гейты правил проекта (RULES.md §2). block по умолчанию; локальный warn — GATE_WARN=1.
      - name: Project rule gates (block)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF" || true
          export GATE_BASE="origin/$BASE_REF"
          node scripts/check-gates/tests-for-new-code.mjs
          node scripts/check-gates/pre-commit-docs.mjs
          node scripts/check-gates/no-secrets-in-diff.mjs || true
          node scripts/check-gates/no-supabase-patterns-in-amvera-sql.mjs || true
