name: PR checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck + build (web)
        run: npm run build -w web

      - name: Tests (web + motivator-core)
        run: npm test

      # Гейты правил проекта (RULES.md §2). Раскатка warn: шаг логирует, но не валит PR
      # (continue-on-error). Промоушен в block: убрать continue-on-error и добавить GATE_BLOCK=1.
      - name: Project rule gates (warn)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF" || true
          export GATE_BASE="origin/$BASE_REF"
          node scripts/check-gates/tests-for-new-code.mjs || true
          node scripts/check-gates/pre-commit-docs.mjs || true
