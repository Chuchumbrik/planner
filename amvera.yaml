# Amvera Cloud — тестовый деплой SPA (Vite, монорепозиторий planner/).
# Окружение Node.js Browser: сборка npm, раздача статики через nginx (SPA fallback).
# Документация: https://docs.amvera.ru/applications/environments/nodejs-browser.html
meta:
  environment: node
  toolchain:
    name: browser
    version: "22"

build:
  # npm install && npm run build:amvera (проверка VITE_* + сборка монорепо).
  # Секреты VITE_* — только в override additionalCommands в панели Amvera (не в git).
  # Шаблон: см. amvera.build.commands.example.txt и web/README.md → «Amvera Cloud».
  additionalCommands: npm run build:amvera
  artifacts:
    "web/dist/*": /
